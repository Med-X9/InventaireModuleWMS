{% extends "admin/change_list.html" %}
{% load i18n admin_urls static %}

{% block content %}
    {# Message de test pour vérifier que le template est chargé #}
    <div style="margin: 10px 0; padding: 15px; background-color: #ffeb3b; border: 2px solid #fbc02d; border-radius: 4px; font-weight: bold;">
        🟡 TEMPLATE PERSONNALISÉ CHARGÉ - Si vous voyez ce message, le template fonctionne !
    </div>
    {{ block.super }}
    <script>
        // Script pour ajouter le bouton "Créer des équipes"
        console.log('🔵 Script du template personnalisé exécuté');
        (function() {
            function addButton() {
                const objectTools = document.querySelector('ul.object-tools');
                console.log('🔍 Recherche de ul.object-tools:', objectTools);
                if (!objectTools) {
                    return false;
                }
                
                if (objectTools.querySelector('a[href*="create-teams"]')) {
                    console.log('✅ Bouton existe déjà');
                    return true;
                }
                
                const li = document.createElement('li');
                const link = document.createElement('a');
                link.href = '/admin/users/userapp/create-teams/';
                link.className = 'addlink';
                link.style.cssText = 'background-color: #28a745 !important; color: white !important; padding: 8px 15px !important; border-radius: 4px !important; text-decoration: none !important;';
                link.textContent = '👥 Créer des équipes';
                
                li.appendChild(link);
                objectTools.appendChild(li);
                
                console.log('✅ Bouton "Créer des équipes" ajouté avec succès');
                return true;
            }
            
            function tryAdd() {
                console.log('🔄 Tentative d\'ajout du bouton...');
                if (!addButton()) {
                    setTimeout(tryAdd, 300);
                }
            }
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', tryAdd);
            } else {
                tryAdd();
            }
            
            setTimeout(tryAdd, 500);
            setTimeout(tryAdd, 1500);
            setTimeout(tryAdd, 3000);
        })();
    </script>
{% endblock %}
